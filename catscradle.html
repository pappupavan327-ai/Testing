<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Laser Cradle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #container { position: relative; width: 100vw; height: 100vh; }
  #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  #loading {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; gap: 20px;
  }
  #loading h1 {
    font-size: clamp(1.5rem, 5vw, 2.5rem); letter-spacing: 0.3em;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #loading p { color: #666; font-size: 0.8rem; letter-spacing: 0.2em; text-align: center; padding: 0 20px; }
  .loader {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #00ffff; border-right-color: #ff00ff;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 0.6rem; letter-spacing: 0.25em; color: rgba(0,255,255,0.5);
    text-transform: uppercase; pointer-events: none; z-index: 50;
  }
  #hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-size: 0.55rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.25);
    text-transform: uppercase; pointer-events: none; z-index: 50;
    text-align: center;
  }
</style>
</head>
<body>
<div id="loading">
  <h1>LASER CRADLE</h1>
  <div class="loader"></div>
  <p id="load-status">Loading AI model...</p>
  <p>Allow camera access when prompted</p>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div id="status">● TRACKING</div>
<div id="hint">Touch fingertips together to explode ✦ Both hands for laser strings</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const loading = document.getElementById('loading');
const loadStatus = document.getElementById('load-status');

// ── Resize ──────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ───────────────────────────────────────────────────────
let hands_data = [];
let particles  = [];
let sparks     = [];
let touchCooldown = {};

// ── Fingertip indices (MediaPipe) ───────────────────────────────
const TIPS = [4, 8, 12, 16, 20]; // thumb, index, middle, ring, pinky
const ALL_LANDMARKS = Array.from({length: 21}, (_, i) => i);

// Finger connections for skeleton
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],[0,17]
];

// ── Color helpers ───────────────────────────────────────────────
function lerpColor(c1, c2, t) {
  const r1=parseInt(c1.slice(1,3),16), g1=parseInt(c1.slice(3,5),16), b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16), g2=parseInt(c2.slice(3,5),16), b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function hslStr(h, s, l, a=1) {
  return `hsla(${h},${s}%,${l}%,${a})`;
}

// Neon palette cycling
const NEON = ['#00ffff','#ff00ff','#ffff00','#00ff88','#ff4488'];
let hueShift = 0;

// ── Particles ───────────────────────────────────────────────────
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 8;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.025;
    this.size = 2 + Math.random() * 5;
    this.color = color;
    this.gravity = 0.15;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y, life: this.life});
    if (this.trail.length > 6) this.trail.shift();
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = (i / this.trail.length) * this.life * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * (i/this.trail.length) * 0.6, 0, Math.PI*2);
      ctx.fillStyle = this.color.replace(')', `,${a})`).replace('rgb','rgba');
      ctx.fill();
    }
    // Core
    ctx.save();
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.globalAlpha = this.life;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life * 1.5, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// Spark (line burst)
class Spark {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 14;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.len = 8 + Math.random() * 30;
    this.life = 1;
    this.decay = 0.03 + Math.random() * 0.05;
    this.color = color;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.92; this.vy *= 0.92;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const nx = this.vx / (Math.abs(this.vx)+0.001);
    const ny = this.vy / (Math.abs(this.vy)+0.001);
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 1.5 * this.life;
    ctx.beginPath();
    ctx.moveTo(this.x - nx * this.len * this.life, this.y - ny * this.len * this.life);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    ctx.restore();
  }
}

function explode(x, y) {
  const colors = ['#00ffff','#ff00ff','#ffff00','#ffffff','#ff4488','#00ff88'];
  const count = 80;
  for (let i = 0; i < count; i++) {
    const c = colors[Math.floor(Math.random() * colors.length)];
    particles.push(new Particle(x, y, c));
  }
  for (let i = 0; i < 40; i++) {
    const c = colors[Math.floor(Math.random() * colors.length)];
    sparks.push(new Spark(x, y, c));
  }
  // Shockwave ring
  sparks.push({isRing: true, x, y, r: 5, maxR: 120, life: 1, color: '#ffffff'});
}

// ── Convert normalized coords ───────────────────────────────────
function toScreen(lm) {
  // video is mirrored via CSS, so we mirror x here too
  return {
    x: (1 - lm.x) * canvas.width,
    y: lm.y * canvas.height,
    z: lm.z
  };
}

// ── Draw laser beam between two points ─────────────────────────
function drawLaser(x1, y1, x2, y2, color1, color2, thickness, dist) {
  const MAX_DIST = 600;
  const t = Math.min(dist / MAX_DIST, 1);

  // Outer glow (thick, low alpha)
  const grad = ctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, color1);
  grad.addColorStop(0.5, lerpColor(color1, color2, 0.5));
  grad.addColorStop(1, color2);

  // Layer 1: wide soft glow
  ctx.save();
  ctx.shadowColor = color1;
  ctx.shadowBlur = 30 + t * 20;
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = grad;
  ctx.lineWidth = thickness * 6;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

  // Layer 2: medium glow
  ctx.shadowBlur = 15;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = thickness * 2.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

  // Layer 3: core bright beam
  ctx.shadowBlur = 8;
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = thickness * 0.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

  // Layer 4: colored core
  ctx.shadowBlur = 4;
  ctx.globalAlpha = 1;
  ctx.strokeStyle = grad;
  ctx.lineWidth = thickness * 0.8;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

  ctx.restore();
}

// ── Draw hand skeleton ──────────────────────────────────────────
function drawHand(landmarks, isLeft) {
  const pts = landmarks.map(toScreen);
  const baseHue = isLeft ? 180 : 300; // cyan for left, magenta for right

  // Draw connections
  ctx.save();
  ctx.shadowBlur = 8;
  ctx.shadowColor = hslStr(baseHue, 100, 60);
  ctx.strokeStyle = hslStr(baseHue, 100, 60, 0.35);
  ctx.lineWidth = 1.2;
  for (const [a, b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  }
  ctx.restore();

  // Draw landmark dots
  for (let i = 0; i < pts.length; i++) {
    const isTip = TIPS.includes(i);
    const size  = isTip ? 7 : 4;
    const hue   = baseHue + (i / pts.length) * 60;
    const color = hslStr(hue, 100, 65);

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = isTip ? 20 : 10;

    // Outer ring
    ctx.beginPath();
    ctx.arc(pts[i].x, pts[i].y, size * 1.8, 0, Math.PI*2);
    ctx.fillStyle = hslStr(hue, 100, 65, 0.2);
    ctx.fill();

    // Mid glow
    ctx.beginPath();
    ctx.arc(pts[i].x, pts[i].y, size, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();

    // White core
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(pts[i].x, pts[i].y, size * 0.45, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.restore();
  }
}

// ── Check touch between fingertips ─────────────────────────────
function checkTouches(leftPts, rightPts) {
  const TOUCH_DIST = 35;
  for (const li of TIPS) {
    for (const ri of TIPS) {
      const key = `${li}-${ri}`;
      const lp  = leftPts[li];
      const rp  = rightPts[ri];
      const dx  = lp.x - rp.x, dy = lp.y - rp.y;
      const d   = Math.sqrt(dx*dx + dy*dy);
      if (d < TOUCH_DIST) {
        if (!touchCooldown[key] || Date.now() - touchCooldown[key] > 400) {
          touchCooldown[key] = Date.now();
          const mx = (lp.x + rp.x) / 2, my = (lp.y + rp.y) / 2;
          explode(mx, my);
        }
      }
    }
  }
}

// ── Main render ─────────────────────────────────────────────────
function drawFrame() {
  hueShift = (hueShift + 0.4) % 360;

  // 1. Draw mirrored video
  ctx.save();
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  // 2. Dark vignette overlay
  const vign = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height*0.25,
    canvas.width/2, canvas.height/2, canvas.height*0.85
  );
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,0,5,0.75)');
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 3. Scan-line effect (subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < canvas.height; y += 3) {
    ctx.fillRect(0, y, canvas.width, 1);
  }

  // 4. Hand data
  let leftHand = null, rightHand = null;
  for (const h of hands_data) {
    if (h.label === 'Left')  leftHand  = h.landmarks;
    if (h.label === 'Right') rightHand = h.landmarks;
  }

  const leftPts  = leftHand  ? leftHand.map(toScreen)  : null;
  const rightPts = rightHand ? rightHand.map(toScreen) : null;

  // 5. Laser strings between hands
  if (leftPts && rightPts) {
    const tipPairs = TIPS.map((li, idx) => ({
      lp: leftPts[li],
      rp: rightPts[TIPS[idx]],
    }));

    for (let i = 0; i < tipPairs.length; i++) {
      const { lp, rp } = tipPairs[i];
      const dx = lp.x - rp.x, dy = lp.y - rp.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const t = Math.min(dist / 500, 1);

      // Color cycles along fingers: cyan→magenta→yellow
      const hue1 = (hueShift + i * 72) % 360;
      const hue2 = (hue1 + 180) % 360;
      const c1 = hslStr(hue1, 100, 65);
      const c2 = hslStr(hue2, 100, 65);

      // Thickness: thicker when close, thinner when far
      const thickness = 3 + (1 - t) * 5;

      drawLaser(lp.x, lp.y, rp.x, rp.y, c1, c2, thickness, dist);
    }

    // Cross strings (index→pinky, pinky→index) for cat's cradle effect
    const crossPairs = [
      { lp: leftPts[8], rp: rightPts[20] },
      { lp: leftPts[20], rp: rightPts[8] },
      { lp: leftPts[12], rp: rightPts[16] },
      { lp: leftPts[16], rp: rightPts[12] },
    ];
    for (let i = 0; i < crossPairs.length; i++) {
      const { lp, rp } = crossPairs[i];
      const dx = lp.x - rp.x, dy = lp.y - rp.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const hue1 = (hueShift + 200 + i * 40) % 360;
      const c1 = hslStr(hue1, 100, 60);
      const c2 = hslStr((hue1+90)%360, 100, 60);
      drawLaser(lp.x, lp.y, rp.x, rp.y, c1, c2, 1.5, dist);
    }

    checkTouches(leftPts, rightPts);
  }

  // 6. Draw each hand skeleton
  if (leftHand)  drawHand(leftHand,  true);
  if (rightHand) drawHand(rightHand, false);

  // 7. Shockwave rings
  sparks = sparks.filter(s => {
    if (s.isRing) {
      s.r += 8; s.life -= 0.04;
      if (s.life <= 0) return false;
      ctx.save();
      ctx.globalAlpha = s.life * 0.6;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2 * s.life;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
      return true;
    }
    s.update(); s.draw(ctx);
    return s.life > 0;
  });

  // 8. Particles
  particles = particles.filter(p => {
    p.update(); p.draw(ctx);
    return p.life > 0;
  });

  requestAnimationFrame(drawFrame);
}

// ── MediaPipe Hands init ────────────────────────────────────────
async function init() {
  try {
    loadStatus.textContent = 'Requesting camera...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: {ideal: 1280}, height: {ideal: 720} }
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    video.play();

    loadStatus.textContent = 'Loading hand tracking AI...';

    const handsModel = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    handsModel.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6,
    });

    handsModel.onResults(results => {
      hands_data = [];
      if (results.multiHandLandmarks && results.multiHandedness) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
          // MediaPipe labels are flipped because video is mirrored
          const rawLabel = results.multiHandedness[i].label;
          const label = rawLabel === 'Left' ? 'Right' : 'Left';
          hands_data.push({ landmarks: results.multiHandLandmarks[i], label });
        }
      }
    });

    loadStatus.textContent = 'Starting camera pipeline...';

    const camera = new Camera(video, {
      onFrame: async () => { await handsModel.send({image: video}); },
      width: 1280, height: 720,
    });

    await camera.start();

    loading.style.transition = 'opacity 0.5s';
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 500);

    drawFrame();

  } catch (err) {
    loadStatus.textContent = '✕ Error: ' + err.message;
    loadStatus.style.color = '#ff4444';
    console.error(err);
  }
}

init();
</script>
</body>
</html>
